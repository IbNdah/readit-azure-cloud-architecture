apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: catalog

  template:
    metadata:
      labels:
        app: catalog

    spec:
      containers:
        - name: catalog
          image: readitacr123.azurecr.io/catalog-service:v4

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          env:
            - name: SERVICEBUS_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: servicebus-secret
                  key: SERVICEBUS_CONNECTION

            - name: SERVICEBUS_QUEUE
              valueFrom:
                secretKeyRef:
                  name: servicebus-secret
                  key: SERVICEBUS_QUEUE
