apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cart

  template:
    metadata:
      labels:
        app: cart

    spec:
      containers:
        - name: cart
          image: readitacr123.azurecr.io/cart-service:v8

          ports:
            - containerPort: 80

          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true

      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "readit-secrets"
