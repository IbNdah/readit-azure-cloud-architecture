name: Build & Deploy to AKS

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 🔹 Catalog
      - name: Build & Push Catalog
        run: |
          docker build -t $ACR_LOGIN_SERVER/catalog-service:$TAG ./catalog-service
          docker push $ACR_LOGIN_SERVER/catalog-service:$TAG

      # 🔹 Cart (clean path now)
      - name: Build & Push Cart
        run: |
          docker build -t $ACR_LOGIN_SERVER/cart-service:$TAG ./cart-service
          docker push $ACR_LOGIN_SERVER/cart-service:$TAG

      # 🔹 Order
      - name: Build & Push Order
        run: |
          docker build -t $ACR_LOGIN_SERVER/order-service:$TAG ./order-service
          docker push $ACR_LOGIN_SERVER/order-service:$TAG

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_NAME }}

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/catalog-deployment \
            catalog=$ACR_LOGIN_SERVER/catalog-service:$TAG

          kubectl set image deployment/cart-deployment \
            cart=$ACR_LOGIN_SERVER/cart-service:$TAG

          kubectl set image deployment/order-deployment \
            order=$ACR_LOGIN_SERVER/order-service:$TAG

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/catalog-deployment
          kubectl rollout status deployment/cart-deployment
          kubectl rollout status deployment/order-deployment
