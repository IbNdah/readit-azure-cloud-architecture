name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: readitacr123
  IMAGE_NAME: catalog-service
  AKS_CLUSTER: readit-aks
  RESOURCE_GROUP: rg-readit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: BUild Docker Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{env.IMAGE_NAME}}:${{ github.sha }} ./catalog-service

      - name: Push image to ACR
        run: |
          az acr login --name $ACR_NAME
          docker push -t ${{ env.ACR_NAME }}.azurecr.io/${{env.IMAGE_NAME}}:${{ github.sha }}

      - name: Set AKS context
        run: |
          az aks get-credentials --name $AKS_NCLUSTER --resource-group $RESOURCE_GROUP --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/catalog-deployment catalog=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha}}
